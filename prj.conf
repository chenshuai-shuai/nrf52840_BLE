# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_FAULT_DUMP=2
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=512
CONFIG_LOG_PROCESS_THREAD=n
CONFIG_THREAD_NAME=n

# Core stacks
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Audio / DMIC / I2S
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_NRFX_PDM=y
CONFIG_I2S=y
CONFIG_I2S_NRFX=y

# Drivers / buses
CONFIG_PINCTRL=y
CONFIG_PINCTRL_NRF=y
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_SERIAL=y

# Power / clock
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_NRF=y
CONFIG_FPU=y
CONFIG_FP_HARDABI=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FILTERING=y

# Safety / analysis
CONFIG_STACK_CANARIES=n
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n

# Platform and HAL
CONFIG_PLATFORM_REGISTRY=y
CONFIG_PLATFORM_NRF52840=y

CONFIG_HAL_AUDIO=y
CONFIG_DRIVER_AUDIO_NRF=y
CONFIG_HAL_PPG=y
CONFIG_DRIVER_PPG_NRF=y
CONFIG_HAL_IMU=y
CONFIG_DRIVER_IMU_NRF=y
CONFIG_HAL_FLASH=n
CONFIG_DRIVER_FLASH_NRF=n
CONFIG_HAL_GPS=n
CONFIG_DRIVER_GPS_NRF=n
CONFIG_HAL_BLE=y
CONFIG_DRIVER_BLE_NRF=y
CONFIG_HAL_MIC=y
CONFIG_DRIVER_MIC_NRF=y
CONFIG_HAL_SPK=y
CONFIG_DRIVER_SPK_NRF=y
CONFIG_HAL_PM=y
CONFIG_DRIVER_PM_NRF=y

# BLE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nrf52840_ble"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=n
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_PHY_UPDATE=y
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_L2CAP_TX_BUF_COUNT=3
CONFIG_BT_BUF_EVT_RX_COUNT=6
CONFIG_BLE_TEST=n
CONFIG_BLE_FORCE_SECURITY=n

# App features
CONFIG_MIC_TEST=y
CONFIG_MIC_LEVEL_TEST=n
CONFIG_MIC_PDM_USE_RIGHT=y
CONFIG_SPK_TEST=n
CONFIG_SPK_BOOT_TONE=y
CONFIG_SPK_STREAM=y
CONFIG_BOOT_TONE=y
CONFIG_PPG_SPI_PROBE=y
CONFIG_PPG_TUNE_MODE=n
CONFIG_IMU_TEST=y
CONFIG_IMU_TDK_AGM=y
CONFIG_IMU_ATTITUDE_UPLINK=y
CONFIG_IMU_USE_FIFO=y
CONFIG_IMU_FIFO_SAMPLE_RING_CAP=8
CONFIG_PM_SERVICE=y
CONFIG_GPS_TEST=n
CONFIG_PM_TEST=n

# Settings storage
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=n
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=2
CONFIG_PARTITION_MANAGER_ENABLED=n
CONFIG_FLASH_MAP_CUSTOM=n
