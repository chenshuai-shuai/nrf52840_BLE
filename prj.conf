CONFIG_FP_HARDABI=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FILTERING=y

# Safety / analysis
CONFIG_STACK_CANARIES=y
CONFIG_THREAD_ANALYZER=n
